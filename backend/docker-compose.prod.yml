services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: cliniq-backend:latest
    restart: unless-stopped
    env_file: .env.prod
    ports:
      - "8000:8000"
    depends_on:
      minio:
        condition: service_started
    networks:
      - cliniq_network
      - shared-services
    volumes:
      - staticfiles:/app/staticfiles

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file: .env.prod
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY requerido}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY requerido}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    networks:
      - cliniq_network

networks:
  cliniq_network:
    name: cliniq_network
    driver: bridge
  shared-services:
    external: true
    name: shared-services

volumes:
  minio_data:
  staticfiles:
